<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Handball Stats v3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
    .header { background: #1e40af; color: white; padding: 16px; }
    .header h1 { font-size: 20px; }
    .header small { font-size: 11px; opacity: 0.8; }
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .card h3 { font-size: 16px; margin-bottom: 8px; }
    .card p { font-size: 14px; color: #666; }
    .error-box { background: #fee2e2; border: 1px solid #f87171; color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 12px; word-break: break-all; }
    .btn { background: #1e40af; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 14px; width: 100%; margin-top: 12px; }
    .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #ddd; display: flex; padding: 8px 0; }
    .nav a { flex: 1; text-align: center; color: #666; text-decoration: none; font-size: 12px; padding: 8px; }
    .nav a.active { color: #1e40af; }
    .badge { display: inline-block; width: 36px; height: 36px; border-radius: 50%; background: #1e40af; color: white; text-align: center; line-height: 36px; font-size: 12px; font-weight: bold; margin-right: 12px; }
    .match-row { display: flex; align-items: center; justify-content: space-between; }
    .team-col { text-align: center; flex: 1; }
    .team-col .badge { margin: 0 auto 4px; }
    .team-col .name { font-size: 11px; }
    .score-col { font-size: 24px; font-weight: bold; color: #1e40af; padding: 0 12px; }
    .hidden { display: none; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .back-btn { background: none; border: none; color: white; font-size: 20px; margin-right: 12px; }
    .flex-header { display: flex; align-items: center; }
    .status { font-size: 10px; color: #666; }
    .live { color: #dc2626; font-weight: bold; }
    .pb-80 { padding-bottom: 80px; }
  </style>
</head>
<body class="pb-80">
  <div id="error-display"></div>
  
  <div id="view-home">
    <div class="header">
      <h1>Handball Stats</h1>
      <small>v3.0 Lite - <span id="load-time"></span></small>
    </div>
    <div class="container">
      <div id="home-content">
        <div class="card"><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <div id="view-teams" class="hidden">
    <div class="header flex-header">
      <button class="back-btn" onclick="go('home')">&#8592;</button>
      <h1>Teams</h1>
    </div>
    <div class="container">
      <button class="btn" onclick="go('add-team')">+ Add Team</button>
      <div id="teams-content" style="margin-top:16px">
        <div class="card"><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <div id="view-add-team" class="hidden">
    <div class="header flex-header">
      <button class="back-btn" onclick="go('teams')">&#8592;</button>
      <h1>Add Team</h1>
    </div>
    <div class="container">
      <form id="team-form" onsubmit="saveTeam(event)">
        <div class="form-group">
          <label>Team Name</label>
          <input type="text" id="t-name" required placeholder="Denmark">
        </div>
        <div class="form-group">
          <label>Short Name (3 letters)</label>
          <input type="text" id="t-short" required maxlength="3" placeholder="DEN">
        </div>
        <div class="form-group">
          <label>Color</label>
          <input type="color" id="t-color" value="#1e40af">
        </div>
        <button type="submit" class="btn">Save Team</button>
      </form>
    </div>
  </div>

  <div id="view-matches" class="hidden">
    <div class="header flex-header">
      <button class="back-btn" onclick="go('home')">&#8592;</button>
      <h1>Matches</h1>
    </div>
    <div class="container">
      <button class="btn" onclick="go('add-match')">+ Schedule Match</button>
      <div id="matches-content" style="margin-top:16px">
        <div class="card"><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <div id="view-add-match" class="hidden">
    <div class="header flex-header">
      <button class="back-btn" onclick="go('matches')">&#8592;</button>
      <h1>Schedule Match</h1>
    </div>
    <div class="container">
      <form id="match-form" onsubmit="saveMatch(event)">
        <div class="form-group">
          <label>Home Team</label>
          <select id="m-home" required><option value="">Select</option></select>
        </div>
        <div class="form-group">
          <label>Away Team</label>
          <select id="m-away" required><option value="">Select</option></select>
        </div>
        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="m-date" required>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="m-location" placeholder="Stadium">
        </div>
        <button type="submit" class="btn">Save Match</button>
      </form>
    </div>
  </div>

  <nav class="nav">
    <a href="#" id="nav-home" class="active" onclick="go('home');return false;">Home</a>
    <a href="#" id="nav-matches" onclick="go('matches');return false;">Matches</a>
    <a href="#" id="nav-teams" onclick="go('teams');return false;">Teams</a>
  </nav>

  <script>
    var teams = [];
    var matches = [];
    var currentView = 'home';

    // Global error handler - shows errors on screen
    window.onerror = function(msg, url, line, col, error) {
      showError('JS Error: ' + msg + ' at line ' + line);
      return false;
    };
    window.onunhandledrejection = function(event) {
      showError('Promise Error: ' + String(event.reason));
    };

    function showError(msg) {
      var el = document.getElementById('error-display');
      el.innerHTML += '<div class="error-box">' + msg + '</div>';
    }

    function log(msg) {
      console.log('[App] ' + msg);
    }

    // Navigation
    function go(view) {
      try {
        document.getElementById('view-' + currentView).classList.add('hidden');
        document.getElementById('view-' + view).classList.remove('hidden');
        currentView = view;
        
        document.querySelectorAll('.nav a').forEach(function(a) { a.classList.remove('active'); });
        var navEl = document.getElementById('nav-' + view);
        if (navEl) navEl.classList.add('active');

        if (view === 'home') loadHome();
        if (view === 'teams') loadTeams();
        if (view === 'matches') loadMatches();
        if (view === 'add-match') populateSelects();
      } catch(e) {
        showError('Navigation error: ' + e.message);
      }
    }

    // Safe date formatting
    function fmtDate(d) {
      try {
        if (!d) return 'TBD';
        var dt = new Date(d);
        if (isNaN(dt.getTime())) return 'Invalid date';
        var month = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()];
        var day = dt.getDate();
        var hr = dt.getHours();
        var min = dt.getMinutes();
        var ampm = hr >= 12 ? 'PM' : 'AM';
        hr = hr % 12 || 12;
        min = min < 10 ? '0' + min : min;
        return month + ' ' + day + ', ' + hr + ':' + min + ' ' + ampm;
      } catch(e) {
        return 'Date error';
      }
    }

    // API calls with full error handling
    function api(path) {
      log('Fetching ' + path);
      return fetch(path)
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .catch(function(e) {
          showError('API ' + path + ' failed: ' + e.message);
          return [];
        });
    }

    function postApi(path, data) {
      log('Posting to ' + path);
      return fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .catch(function(e) {
        showError('API POST ' + path + ' failed: ' + e.message);
        return null;
      });
    }

    // Load home data
    function loadHome() {
      log('Loading home');
      Promise.all([api('/api/teams'), api('/api/matches')])
        .then(function(results) {
          teams = results[0] || [];
          matches = results[1] || [];
          renderHome();
        })
        .catch(function(e) {
          showError('Load home error: ' + e.message);
        });
    }

    function renderHome() {
      try {
        var html = '';
        
        // Quick actions
        html += '<div class="card" onclick="go(\'matches\')" style="cursor:pointer"><h3>Matches</h3><p>View and schedule</p></div>';
        html += '<div class="card" onclick="go(\'teams\')" style="cursor:pointer"><h3>Teams</h3><p>Manage rosters</p></div>';
        
        // Recent matches
        if (matches.length > 0) {
          html += '<h3 style="margin:20px 0 12px;font-size:14px;color:#666">RECENT MATCHES</h3>';
          for (var i = 0; i < Math.min(3, matches.length); i++) {
            html += renderMatchCard(matches[i]);
          }
        } else {
          html += '<div class="card"><p>No matches yet</p></div>';
        }
        
        document.getElementById('home-content').innerHTML = html;
        log('Home rendered');
      } catch(e) {
        showError('Render home error: ' + e.message);
      }
    }

    function renderMatchCard(m) {
      try {
        var home = findTeam(m.homeTeamId);
        var away = findTeam(m.awayTeamId);
        var statusText = m.status === 'in_progress' ? 'LIVE' : (m.status === 'finished' ? 'Final' : fmtDate(m.date));
        var statusClass = m.status === 'in_progress' ? 'live' : '';
        
        return '<div class="card match-row">' +
          '<div class="team-col"><div class="badge" style="background:' + home.color + '">' + home.shortName + '</div><div class="name">' + home.name + '</div></div>' +
          '<div class="score-col">' + (m.homeScore || 0) + ' - ' + (m.awayScore || 0) + '<div class="status ' + statusClass + '">' + statusText + '</div></div>' +
          '<div class="team-col"><div class="badge" style="background:' + away.color + '">' + away.shortName + '</div><div class="name">' + away.name + '</div></div>' +
        '</div>';
      } catch(e) {
        return '<div class="card"><p>Error rendering match</p></div>';
      }
    }

    function findTeam(id) {
      for (var i = 0; i < teams.length; i++) {
        if (teams[i].id === id) return teams[i];
      }
      return { name: 'TBD', shortName: '?', color: '#999' };
    }

    // Teams
    function loadTeams() {
      log('Loading teams');
      api('/api/teams').then(function(data) {
        teams = data || [];
        renderTeams();
      });
    }

    function renderTeams() {
      try {
        if (teams.length === 0) {
          document.getElementById('teams-content').innerHTML = '<div class="card"><p>No teams yet</p></div>';
          return;
        }
        var html = '';
        for (var i = 0; i < teams.length; i++) {
          var t = teams[i];
          html += '<div class="card" style="display:flex;align-items:center">' +
            '<div class="badge" style="background:' + t.color + '">' + t.shortName + '</div>' +
            '<div><strong>' + t.name + '</strong></div>' +
          '</div>';
        }
        document.getElementById('teams-content').innerHTML = html;
      } catch(e) {
        showError('Render teams error: ' + e.message);
      }
    }

    function saveTeam(e) {
      e.preventDefault();
      var data = {
        name: document.getElementById('t-name').value,
        shortName: document.getElementById('t-short').value.toUpperCase(),
        color: document.getElementById('t-color').value
      };
      postApi('/api/teams', data).then(function(result) {
        if (result) {
          document.getElementById('team-form').reset();
          go('teams');
        }
      });
    }

    // Matches
    function loadMatches() {
      log('Loading matches');
      Promise.all([api('/api/teams'), api('/api/matches')])
        .then(function(results) {
          teams = results[0] || [];
          matches = results[1] || [];
          renderMatches();
        });
    }

    function renderMatches() {
      try {
        if (matches.length === 0) {
          document.getElementById('matches-content').innerHTML = '<div class="card"><p>No matches yet</p></div>';
          return;
        }
        var html = '';
        for (var i = 0; i < matches.length; i++) {
          html += renderMatchCard(matches[i]);
        }
        document.getElementById('matches-content').innerHTML = html;
      } catch(e) {
        showError('Render matches error: ' + e.message);
      }
    }

    function populateSelects() {
      try {
        var opts = '<option value="">Select</option>';
        for (var i = 0; i < teams.length; i++) {
          opts += '<option value="' + teams[i].id + '">' + teams[i].name + '</option>';
        }
        document.getElementById('m-home').innerHTML = opts;
        document.getElementById('m-away').innerHTML = opts;
      } catch(e) {
        showError('Populate selects error: ' + e.message);
      }
    }

    function saveMatch(e) {
      e.preventDefault();
      try {
        var dateVal = document.getElementById('m-date').value;
        var data = {
          homeTeamId: parseInt(document.getElementById('m-home').value),
          awayTeamId: parseInt(document.getElementById('m-away').value),
          date: dateVal ? new Date(dateVal).toISOString() : new Date().toISOString(),
          location: document.getElementById('m-location').value || '',
          status: 'scheduled'
        };
        postApi('/api/matches', data).then(function(result) {
          if (result) {
            document.getElementById('match-form').reset();
            go('matches');
          }
        });
      } catch(e) {
        showError('Save match error: ' + e.message);
      }
    }

    // Clear old service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }

    // Show load time and start
    document.getElementById('load-time').textContent = new Date().toLocaleTimeString();
    log('Starting app');
    loadHome();
  </script>
</body>
</html>
